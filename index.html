<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="Rock-Paper-Scissors.css">
    </head>
    <body>
        <div class="container">
            <h1>Rock Paper Scissors</h1>
            <div class="score">
                <div class="score-item">
                    <div>You</div>
                    <div class="score-value" id="userScore">0</div>
                </div>
                <div class="score-item">
                    <div>Computer</div>
                    <div class="score-value" id="compScore">0</div>
                </div>
            </div>
            <div class="choices">
                <button class="rock" onclick="play('rock')">Rock</button>
                <button class="paper" onclick="play('paper')">Paper</button>
                <button class="scissors" onclick="play('scissors')">Scissors</button>
            </div>
            <div class="result" id="result"></div>
        </div>
        <script src="Rock-Paper-Scissors.js"></script>
    </body>
</html>
